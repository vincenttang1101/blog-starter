name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Type Check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: examples/blog-starter
        run: npm install

      - name: Type check
        working-directory: examples/blog-starter
        run: npx tsc --noEmit

      - name: Build
        working-directory: examples/blog-starter
        run: npm run build

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: examples/blog-starter
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
